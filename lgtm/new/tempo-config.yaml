# Monolithic single-binary Tempo; minimal YAML works with pinned image below.
target: all

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

metrics_generator:
  storage:
    path: /tmp/tempo/generator/wal
  traces_storage:
    path: /tmp/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks, span-metrics, service-graphs]

# ingester:
#   trace_idle_period: 10s
#   max_block_duration: 5m

# compactor:
#   compaction:
#     block_retention: 24h
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo
